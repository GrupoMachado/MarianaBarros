<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="manifest" href="manifest.json">
    <title>+500 Exercícios com Elástico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuração segura do Tailwind
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#f97316',
                            secondary: '#ea580c',
                            dark: '#0f172a',
                        }
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    boxShadow: {
                        'neon-lg': '0 0 20px rgba(34, 211, 238, 0.4), 0 0 40px rgba(168, 85, 247, 0.2)',
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>


    <style>
        :root {
            --bg-primary: #0a0a0c;
            --bg-secondary: #0f172a;
            --bg-card: #111827;
            --bg-card-hover: #172033;
            --bg-surface: #1f2937;
            --bg-modal-overlay: rgba(0, 0, 0, 0.75);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #f97316;
            --accent-hover: #ea580c;
            --accent-glow: rgba(249, 115, 22, 0.35);
            --accent-soft: rgba(249, 115, 22, 0.12);
            --green: #22c55e;
            --red: #ef4444;
            --border: rgba(255, 255, 255, 0.06);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px var(--accent-glow);
            --font-technical: 'Orbitron', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@400;700;900&display=swap');

        .font-technical { font-family: var(--font-technical); }
        .font-mono { font-family: var(--font-mono); }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        html,
        body,
        #root {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh !important;
            background: linear-gradient(135deg, #020617, #0f172a, #000000);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        @keyframes ping-slow {
            0% { transform: scale(1); opacity: 1; }
            70%, 100% { transform: scale(2.5); opacity: 0; }
        }
        .animate-ping-slow {
            animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes flash-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(249, 115, 22, 0.2), inset 0 0 5px rgba(249, 115, 22, 0.1); }
            50% { box-shadow: 0 0 35px rgba(249, 115, 22, 0.6), inset 0 0 15px rgba(249, 115, 22, 0.3); }
        }
        .flash-quest-card {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.1) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 2px solid rgba(249, 115, 22, 0.4);
            animation: flash-pulse 3s infinite;
        }

        h1, h2, h3, h4, h5, h6 {
            color: #ffffff;
            margin-bottom: 0.5em;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.05;
            background-image: url('muscles.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 0;
        }

        .app-layout {
            display: flex;
            width: 100vw !important;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .app-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            width: 100vw !important;
        }

        /* -- AUTH UI CSS -- */
        .auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), 0 0 40px var(--accent-soft);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 900;
            font-size: 28px;
        }

        .auth-card .ob-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 4px;
        }

        .auth-card .ob-submit-btn {
            width: 100%;
            margin-top: 24px;
            padding: 18px;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s;
        }

        .auth-toggle:hover {
            color: var(--text-primary);
        }

        .auth-toggle span {
            color: var(--accent);
            font-weight: 600;
            margin-left: 6px;
        }

        .auth-error {
            color: var(--red);
            font-size: 13px;
            text-align: center;
            margin-top: -8px;
            margin-bottom: 8px;
            min-height: 20px;
            font-weight: 500;
        }

        .auth-header-desc {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 15px;
        }

        /* -- FIM AUTH UI CSS -- */
        
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        .time-input-wrapper {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        .time-input-wrapper input[type="time"] {
            color-scheme: dark;
            cursor: pointer;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            padding: 16px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        input {
            font-family: inherit;
            border: none;
            outline: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 999px;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 16px;
            height: 72px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 800;
        }

        .header-logo .accent {
            color: var(--accent);
        }

        .search-wrapper {
            flex: 1;
            max-width: 520px;
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 44px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-full);
            padding: 0 16px 0 44px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(30, 41, 59, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            color: var(--text-muted);
        }

        .main {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 16px 16px 100px;
        }

        .hero {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 40%, rgba(26, 8, 0, 0.8) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: 40px;
            margin-bottom: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 50%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-soft) 0%, transparent 60%);
            transform: rotate(-45deg);
            pointer-events: none;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .hero-subtitle {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .filter-section {
            margin-bottom: 28px;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .pill {
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-glow);
        }

        .card-thumb {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 10;
            background: #000;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            opacity: 0.9;
        }

        .card:hover .card-thumb img {
            transform: scale(1.1);
            opacity: 1;
        }

        /* -- RANKING ATMOSPHERES -- */
        .ranking-wrapper {
            position: relative;
            min-height: 100vh;
            transition: all 1.5s ease;
            padding-bottom: 40px;
        }
        .ranking-wrapper.elite::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 600px;
            background: radial-gradient(circle at top, rgba(234, 179, 8, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .ranking-wrapper.diamond::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.06), transparent 60%),
                        radial-gradient(circle at top left, rgba(34, 211, 238, 0.04), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .ranking-wrapper.platinum {
            background: linear-gradient(135deg, rgba(226, 232, 240, 0.03) 0%, transparent 40%);
        }
        .floating-dust {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .dust-particle {
            position: absolute;
            width: 2px; height: 2px;
            background: #facc15;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp var(--duration) linear infinite;
            bottom: -10px;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(var(--drift)); opacity: 0; }
        }

        /* -- ONBOARDING CSS -- */
        .onboarding-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
        }

        .onboarding-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: 24px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .onboarding-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .ob-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .ob-input option {
            background-color: #0f172a;
            color: #ffffff;
        }

        .ob-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
            background: rgba(15, 23, 42, 0.8);
        }

        .goal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .goal-btn {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }

        .goal-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .goal-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 8px 24px var(--accent-glow);
            transform: scale(1.02);
        }

        .ob-submit-btn {
            margin-top: 16px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), #ff9a44);
            border-radius: var(--radius-lg);
            color: white;
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .ob-submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--accent-glow);
        }

        .ob-submit-btn:disabled {
            background: var(--bg-surface);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* -- FIM ONBOARDING CSS -- */

        /* -- GAMIFICATION & PROGRESS UI CSS -- */
        .progress-dashboard {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .progress-level-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .xp-bar-bg {
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff9a44);
            border-radius: var(--radius-full);
            box-shadow: 0 0 12px var(--accent-glow);
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gamification-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .stat-premium-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.3s;
        }

        .stat-premium-card:hover {
            transform: translateY(-4px);
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .spc-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .spc-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .spc-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 860px) {
            .progress-bottom-grid {
                grid-template-columns: 1fr;
            }
        }

        .progress-section-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xl);
            padding: 28px;
            box-sizing: border-box;
            max-width: 100%;
            overflow: hidden;
        }

        .ps-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cat-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cat-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cat-lbl {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
        }

        .cat-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .cat-bar-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 1s ease-out;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .badge-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .badge-card.unlocked {
            border-color: var(--bc);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), inset 0 0 20px -10px var(--bc);
            background: rgba(30, 41, 59, 0.8);
        }

        .badge-card.locked {
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .badge-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .badge-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .badge-desc {
            font-size: 9px;
            color: var(--text-secondary);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            gap: 16px;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .hi-icon {

<body>
    <div id="root"></div>

    <!-- INÍCIO DO SCANNER DE REFEIÇÕES IA -->
    <div id="scanner-container" class="hidden fixed inset-0 z-[100000] bg-gray-900 flex flex-col">
      <div class="p-4 bg-gray-800 flex justify-between items-center border-b border-gray-700">
        <h2 class="text-white font-bold text-lg">Scanner IA</h2>
        <button id="close-scanner-btn" class="text-orange-500 font-bold">Voltar</button>
      </div>
      
      <div class="relative flex-1 bg-black flex justify-center items-center overflow-hidden">
        <video id="camera-feed" class="w-full h-full object-cover" autoplay playsinline></video>
        <img id="photo-preview" class="hidden w-full h-full object-cover" />
        
        <div id="ai-loading" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center">
          <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-orange-500 mb-4"></div>
          <p class="text-white font-bold animate-pulse">Analisando macros...</p>
        </div>
      </div>

      <div class="p-6 bg-gray-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-10">
        <div class="mb-4 text-center">
          <p class="text-xs text-gray-400 uppercase tracking-widest">Objetivo Diário</p>
          <p class="text-sm font-bold text-green-400">Crescer Seco: ~2.700 kcal</p>
        </div>

        <div id="hidden-calories-form" class="hidden mb-4 flex justify-center gap-4">
          <label class="flex items-center text-white text-sm"><input type="checkbox" id="add-oil" class="mr-2 rounded text-orange-500 focus:ring-orange-500" /> + Azeite/Óleo</label>
          <label class="flex items-center text-white text-sm"><input type="checkbox" id="add-sauce" class="mr-2 rounded text-orange-500 focus:ring-orange-500" /> + Molho</label>
        </div>

        <button id="capture-btn" class="w-full rounded-full bg-orange-500 py-4 font-bold text-white shadow-lg hover:bg-orange-600 transition-colors text-lg flex items-center justify-center gap-2">
          📸 Tirar Foto
        </button>
        
        <div id="result-actions" class="hidden w-full flex gap-3">
          <button id="retake-btn" class="flex-1 rounded-xl bg-gray-700 py-3 font-bold text-white hover:bg-gray-600 transition-colors">Repetir</button>
          <button id="confirm-meal-btn" class="flex-1 rounded-xl bg-green-500 py-3 font-bold text-white shadow-lg hover:bg-green-600 transition-colors">✅ Salvar</button>
        </div>
      
      </div>
      
      <canvas id="capture-canvas" class="hidden"></canvas>
    </div>

    <script>
        // Lógica do Scanner Vanilla JS
        let cameraStream = null;

        window.startScannerCamera = async function() {
            const video = document.getElementById('camera-feed');
            const photoPreview = document.getElementById('photo-preview');
            const captureBtn = document.getElementById('capture-btn');
            const resultActions = document.getElementById('result-actions');
            const hiddenForm = document.getElementById('hidden-calories-form');
            
            // Reset UI
            if (video) video.classList.remove('hidden');
            if (photoPreview) {
                photoPreview.classList.add('hidden');
                photoPreview.src = '';
            }
            if (captureBtn) captureBtn.classList.remove('hidden');
            if (resultActions) resultActions.classList.add('hidden');
            if (hiddenForm) hiddenForm.classList.add('hidden');

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                if (video) {
                    video.srcObject = cameraStream;
                    video.play().catch(e => console.error("Erro ao dar play no video:", e));
                }
            } catch (err) {
                console.error("Erro ao abrir a câmara:", err);
                alert("Não foi possível acessar a câmera! Autorize as permissões ou verifique se não está sendo usada por outro app.");
            }
        };

        window.stopScannerCamera = function() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            const video = document.getElementById('camera-feed');
            if (video) video.srcObject = null;
        };

        // Eventos a serem vinculados apenas uma vez
        window.addEventListener('load', function() {
            const _closeScannerBtn = document.getElementById('close-scanner-btn');
            if (_closeScannerBtn) {
                _closeScannerBtn.addEventListener('click', () => {
                    window.stopScannerCamera();
                    const scannerContainer = document.getElementById('scanner-container');
                    if (scannerContainer) scannerContainer.classList.add('hidden');
                    
                    // Restaurar página de extras apenas se necessário
                    const extrasWrapper = document.getElementById('extras-page');
                    if (extrasWrapper && extrasWrapper.classList.contains('hidden')) {
                        extrasWrapper.classList.remove('hidden');
                        extrasWrapper.style.display = 'block';
                    }
                });
            }

            const _captureBtn = document.getElementById('capture-btn');
            const _retakeBtn = document.getElementById('retake-btn');
            const _video = document.getElementById('camera-feed');
            const _photoPreview = document.getElementById('photo-preview');
            const _canvas = document.getElementById('capture-canvas');
            const _resultActions = document.getElementById('result-actions');
            const _hiddenForm = document.getElementById('hidden-calories-form');

            if (_captureBtn && _video && _canvas) {
                _captureBtn.addEventListener('click', () => {
                    const ctx = _canvas.getContext('2d');
                    _canvas.width = _video.videoWidth || 1080;
                    _canvas.height = _video.videoHeight || 1920;
                    ctx.drawImage(_video, 0, 0, _canvas.width, _canvas.height);
                    
                    const base64Photo = _canvas.toDataURL('image/jpeg', 0.8);
                    if (_photoPreview) _photoPreview.src = base64Photo;
                    
                    _video.classList.add('hidden');
                    if (_photoPreview) _photoPreview.classList.remove('hidden');
                    
                    _captureBtn.classList.add('hidden');
                    if (_resultActions) _resultActions.classList.remove('hidden');
                    if (_hiddenForm) _hiddenForm.classList.remove('hidden');
                });
            }

            if (_retakeBtn) {
                _retakeBtn.addEventListener('click', () => {
                    if (_video) _video.classList.remove('hidden');
                    if (_photoPreview) {
                        _photoPreview.classList.add('hidden');
                        _photoPreview.src = '';
                    }
                    
                    if (_captureBtn) _captureBtn.classList.remove('hidden');
                    if (_resultActions) _resultActions.classList.add('hidden');
                    if (_hiddenForm) _hiddenForm.classList.add('hidden');
                });
            }

            const _confirmBtn = document.getElementById('confirm-meal-btn');
            const _loadingOverlay = document.getElementById('ai-loading');
            if (_confirmBtn && _loadingOverlay) {
                _confirmBtn.addEventListener('click', async () => {
                    _loadingOverlay.classList.remove('hidden');
                    
                    try {
                        if (!window.supabase) throw new Error("Supabase não iniciado");
                        
                        // 1. Obter Utilizador
                        const { data: { user } } = await window.supabase.auth.getUser();
                        if (!user) {
                            alert("Sessão expirada. Faça login novamente.");
                            return;
                        }

                        // 2. Simular Análise IA (Gerar macros dinâmicos para a demonstração)
                        const kcal = Math.floor(400 + Math.random() * 500);
                        const desc = "Refeição Scanner IA";

                        // 3. Gravar no Banco de Dados
                        const { error } = await window.supabase
                            .from('nutrition_logs')
                            .insert([{
                                user_id: user.id,
                                description: desc,
                                calories: kcal,
                                created_at: new Date().toISOString()
                            }]);

                        if (error) throw error;

                        // 4. Sucesso e Notificação Global
                        _loadingOverlay.classList.add('hidden');
                        
                        // Disparar evento para o React Dashboard ouvir
                        window.dispatchEvent(new CustomEvent('nutrition-updated'));

                        alert(`✅ ${desc} registado!\nCalculado: +${kcal} kcal.`);
                        
                        const closeBtn = document.getElementById('close-scanner-btn');
                        if (closeBtn) closeBtn.click();

                    } catch (err) {
                        console.error("Erro no Scanner:", err);
                        _loadingOverlay.classList.add('hidden');
                        alert("Falha ao salvar: " + (err.message || "Erro desconhecido"));
                    }
                });
            }
        });
    </script>
