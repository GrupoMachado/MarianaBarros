                                                            border: `2px solid ${isDone ? '#22d3ee' : 'rgba(255,255,255,0.2)'}`,
                                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                            background: isDone ? '#22d3ee' : 'transparent',
                                                            transition: 'all 0.2s'
                                                        }}>
                                                            {isDone && <svg viewBox="0 0 24 24" width="14" height="14" stroke="#000" strokeWidth="4" fill="none"><path d="M20 6L9 17L4 12" /></svg>}
                                                        </div>
                                                        <div>
                                                            <span style={{ fontSize: '12px', fontWeight: '900', color: isDone ? '#22d3ee' : '#22d3ee', letterSpacing: '1px' }}>{categoryLabel}</span>
                                                            <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.4)', marginTop: '2px', fontWeight: '700' }}>3 SÉRIES • REPS ATÉ À FALHA</div>
                                                        </div>
                                                    </div>
                                                    <div style={{ color: isActive ? '#22d3ee' : 'rgba(255,255,255,0.2)' }}>
                                                        {isActive ? (
                                                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" /></svg>
                                                        ) : (
                                                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z" /></svg>
                                                        )}
                                                    </div>
                                                </div>

                                                {isActive && (
                                                    <div style={{ animation: 'fade-in 0.3s ease-out', padding: '0 12px 20px 12px' }}>
                                                        <div className="full-body-video-wrapper" style={{ aspectRatio: '16/9', background: '#000', borderRadius: '12px', overflow: 'hidden', position: 'relative' }}>
                                                            {videoSrc ? (
                                                                <video
                                                                    src={videoSrc}
                                                                    poster={posterUrl}
                                                                    controls
                                                                    playsInline
                                                                    preload="none"
                                                                    style={{ width: '100%', height: '100%', objectFit: 'contain', cursor: 'pointer' }}
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        const v = e.target;
                                                                        v.paused ? v.play() : v.pause();
                                                                    }}
                                                                />
                                                            ) : (
                                                                <iframe
                                                                    src={embedUrl}
                                                                    title="Bunny Player"
                                                                    style={{ width: '100%', height: '100%', border: 'none' }}
                                                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                                                    allowFullScreen
                                                                />
                                                            )}
                                                        </div>

                                                        <div style={{ marginTop: '16px', padding: '0 4px' }}>
                                                            <h4 style={{ color: '#fff', fontSize: '14px', fontWeight: '800', marginBottom: '8px' }}>Execução Correta:</h4>
                                                            <div style={{ fontSize: '13px', color: 'rgba(255,255,255,0.6)', lineHeight: '1.6' }}>
                                                                {ex.description || "Siga o movimento do vídeo com técnica apurada. Expire no esforço e mantenha o core contraído."}
                                                            </div>

                                                            <button
                                                                onClick={toggleDone}
                                                                style={{
                                                                    marginTop: '16px', width: '100%', padding: '12px',
                                                                    borderRadius: '12px', background: isDone ? 'rgba(34,211,238,0.1)' : '#fff',
                                                                    color: isDone ? '#22d3ee' : '#000', fontWeight: '900', fontSize: '12px',
                                                                    textTransform: 'uppercase', letterSpacing: '1px', border: isDone ? '1px solid #22d3ee' : 'none',
                                                                    transition: 'all 0.2s'
                                                                }}
                                                            >
                                                                {isDone ? '✓ BLOCO CONCLUÍDO' : 'MARCAR COMO FEITO'}
                                                            </button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                <button
                                    className="btn-conclude-workout"
                                    style={{
                                        marginTop: '24px',
                                        width: '100%',
                                        padding: '18px',
                                        borderRadius: '16px',
                                        background: 'linear-gradient(135deg, #14b8a6, #0f766e)',
                                        color: '#fff',
                                        fontWeight: '900',
                                        fontSize: '16px',
                                        textTransform: 'uppercase',
                                        letterSpacing: '1px',
                                        border: 'none',
                                        cursor: 'pointer',
                                        boxShadow: '0 8px 24px rgba(20, 184, 166, 0.2)'
                                    }}
                                    onClick={concludeDailyWorkout}
                                >
                                    Concluir Treino de Hoje
                                </button>
                            </div>
                        </div>
                    )}

                </div>);
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        // Registro do Service Worker para Otimização e Cache de Vídeo
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✓ Video Optimizer SW registrado!', reg.scope))
                    .catch(err => console.warn('✗ Falha ao registar SW:', err));
            });
        }
    </script>
    <div id="modal-root"></div>
    <div id="portal-root"></div>


    <!-- INÍCIO DO SCANNER DE REFEIÇÕES IA -->
    <div id="scanner-container" class="hidden fixed inset-0 z-[100000] bg-gray-900 flex flex-col">
      <div class="p-4 bg-gray-800 flex justify-between items-center border-b border-gray-700">
        <h2 class="text-white font-bold text-lg">Scanner IA</h2>
        <button id="close-scanner-btn" class="text-orange-500 font-bold">Voltar</button>
      </div>
      
      <div class="relative flex-1 bg-black flex justify-center items-center overflow-hidden">
        <video id="camera-feed" class="w-full h-full object-cover" autoplay playsinline></video>
        <img id="photo-preview" class="hidden w-full h-full object-cover" />
        
        <div id="ai-loading" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center">
          <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-orange-500 mb-4"></div>
          <p class="text-white font-bold animate-pulse">Analisando macros...</p>
        </div>
      </div>

      <div class="p-6 bg-gray-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-10">
        <div class="mb-4 text-center">
          <p class="text-xs text-gray-400 uppercase tracking-widest">Objetivo Diário</p>
          <p class="text-sm font-bold text-green-400">Crescer Seco: ~2.700 kcal</p>
        </div>

        <div id="hidden-calories-form" class="hidden mb-4 flex justify-center gap-4">
          <label class="flex items-center text-white text-sm"><input type="checkbox" id="add-oil" class="mr-2 rounded text-orange-500 focus:ring-orange-500" /> + Azeite/Óleo</label>
          <label class="flex items-center text-white text-sm"><input type="checkbox" id="add-sauce" class="mr-2 rounded text-orange-500 focus:ring-orange-500" /> + Molho</label>
        </div>

        <button id="capture-btn" class="w-full rounded-full bg-orange-500 py-4 font-bold text-white shadow-lg hover:bg-orange-600 transition-colors text-lg flex items-center justify-center gap-2">
          📸 Tirar Foto
        </button>
        
        <div id="result-actions" class="hidden w-full flex gap-3">
          <button id="retake-btn" class="flex-1 rounded-xl bg-gray-700 py-3 font-bold text-white hover:bg-gray-600 transition-colors">Repetir</button>
          <button id="confirm-meal-btn" class="flex-1 rounded-xl bg-green-500 py-3 font-bold text-white shadow-lg hover:bg-green-600 transition-colors">✅ Salvar</button>
        </div>
      
      </div>
      
      <canvas id="capture-canvas" class="hidden"></canvas>
    </div>

    <script>
        // Lógica do Scanner Vanilla JS
        let cameraStream = null;

        window.startScannerCamera = async function() {
            const video = document.getElementById('camera-feed');
            const photoPreview = document.getElementById('photo-preview');
            const captureBtn = document.getElementById('capture-btn');
            const resultActions = document.getElementById('result-actions');
            const hiddenForm = document.getElementById('hidden-calories-form');
            
            // Reset UI
            if (video) video.classList.remove('hidden');
            if (photoPreview) {
                photoPreview.classList.add('hidden');
                photoPreview.src = '';
            }
            if (captureBtn) captureBtn.classList.remove('hidden');
            if (resultActions) resultActions.classList.add('hidden');
            if (hiddenForm) hiddenForm.classList.add('hidden');

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                if (video) {
                    video.srcObject = cameraStream;
                    video.play().catch(e => console.error("Erro ao dar play no video:", e));
                }
            } catch (err) {
                console.error("Erro ao abrir a câmara:", err);
                alert("Não foi possível acessar a câmera! Autorize as permissões ou verifique se não está sendo usada por outro app.");
            }
        };

        window.stopScannerCamera = function() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            const video = document.getElementById('camera-feed');
            if (video) video.srcObject = null;
        };

        // Eventos a serem vinculados apenas uma vez
        window.addEventListener('load', function() {
            const _closeScannerBtn = document.getElementById('close-scanner-btn');
            if (_closeScannerBtn) {
                _closeScannerBtn.addEventListener('click', () => {
                    window.stopScannerCamera();
                    const scannerContainer = document.getElementById('scanner-container');
                    if (scannerContainer) scannerContainer.classList.add('hidden');
                    
                    // Restaurar página de extras apenas se necessário
                    const extrasWrapper = document.getElementById('extras-page');
                    if (extrasWrapper && extrasWrapper.classList.contains('hidden')) {
                        extrasWrapper.classList.remove('hidden');
                        extrasWrapper.style.display = 'block';
                    }
                });
            }

            const _captureBtn = document.getElementById('capture-btn');
            const _retakeBtn = document.getElementById('retake-btn');
            const _video = document.getElementById('camera-feed');
            const _photoPreview = document.getElementById('photo-preview');
            const _canvas = document.getElementById('capture-canvas');
            const _resultActions = document.getElementById('result-actions');
            const _hiddenForm = document.getElementById('hidden-calories-form');

            if (_captureBtn && _video && _canvas) {
                _captureBtn.addEventListener('click', () => {
                    const ctx = _canvas.getContext('2d');
                    _canvas.width = _video.videoWidth || 1080;
                    _canvas.height = _video.videoHeight || 1920;
                    ctx.drawImage(_video, 0, 0, _canvas.width, _canvas.height);
                    
                    const base64Photo = _canvas.toDataURL('image/jpeg', 0.8);
                    if (_photoPreview) _photoPreview.src = base64Photo;
                    
                    _video.classList.add('hidden');
                    if (_photoPreview) _photoPreview.classList.remove('hidden');
                    
                    _captureBtn.classList.add('hidden');
                    if (_resultActions) _resultActions.classList.remove('hidden');
                    if (_hiddenForm) _hiddenForm.classList.remove('hidden');
                });
            }

            if (_retakeBtn) {
                _retakeBtn.addEventListener('click', () => {
                    if (_video) _video.classList.remove('hidden');
                    if (_photoPreview) {
                        _photoPreview.classList.add('hidden');
                        _photoPreview.src = '';
                    }
                    
                    if (_captureBtn) _captureBtn.classList.remove('hidden');
                    if (_resultActions) _resultActions.classList.add('hidden');
                    if (_hiddenForm) _hiddenForm.classList.add('hidden');
                });
            }

            const _confirmBtn = document.getElementById('confirm-meal-btn');
            const _loadingOverlay = document.getElementById('ai-loading');
            if (_confirmBtn && _loadingOverlay) {
                _confirmBtn.addEventListener('click', async () => {
                    _loadingOverlay.classList.remove('hidden');
                    
                    try {
                        if (!window.supabase) throw new Error("Supabase não iniciado");
                        
                        // 1. Obter Utilizador
                        const { data: { user } } = await window.supabase.auth.getUser();
                        if (!user) {
                            alert("Sessão expirada. Faça login novamente.");
                            return;
                        }

                        // 2. Simular Análise IA (Gerar macros dinâmicos para a demonstração)
                        const kcal = Math.floor(400 + Math.random() * 500);
                        const desc = "Refeição Scanner IA";

                        // 3. Gravar no Banco de Dados
                        const { error } = await window.supabase
                            .from('nutrition_logs')
                            .insert([{
                                user_id: user.id,
                                description: desc,
                                calories: kcal,
                                created_at: new Date().toISOString()
                            }]);

                        if (error) throw error;

                        // 4. Sucesso e Notificação Global
                        _loadingOverlay.classList.add('hidden');
                        
                        // Disparar evento para o React Dashboard ouvir
                        window.dispatchEvent(new CustomEvent('nutrition-updated'));

                        alert(`✅ ${desc} registado!\nCalculado: +${kcal} kcal.`);
                        
                        const closeBtn = document.getElementById('close-scanner-btn');
                        if (closeBtn) closeBtn.click();

                    } catch (err) {
                        console.error("Erro no Scanner:", err);
                        _loadingOverlay.classList.add('hidden');
                        alert("Falha ao salvar: " + (err.message || "Erro desconhecido"));
                    }
                });
            }
        });
    </script>
</body>
